version: "3.9"

networks:
  readyboard-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:


services:
  # ─────────────────────────────────────────────
  #  Data Layer
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-readyboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-readyboard_secret}
      POSTGRES_DB: ${POSTGRES_DB:-readyboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - readyboard-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-readyboard} -d ${POSTGRES_DB:-readyboard}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    networks:
      - readyboard-net
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────
  #  Backend Services
  # ─────────────────────────────────────────────
  backend-api:
    build:
      context: .
      dockerfile: backend-api/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-readyboard}:${POSTGRES_PASSWORD:-readyboard_secret}@postgres:5432/${POSTGRES_DB:-readyboard}?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-super_secret_refresh_key_change_in_production}
      - PORT=8080
      - ENV=${ENV:-development}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_ID=${STRIPE_PRICE_ID_PRO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - readyboard-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend-ws:
    build:
      context: ./backend-ws
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      - PORT=8081
      - ENV=${ENV:-development}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - readyboard-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────
  #  Frontend Services
  # ─────────────────────────────────────────────
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
      args:
        - VITE_STRIPE_PRICE_ID_PRO=${VITE_STRIPE_PRICE_ID_PRO}
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=/api
      - VITE_WS_BASE_URL=/ws
    networks:
      - readyboard-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend-display:
    build:
      context: ./frontend-display
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=/api
      - VITE_WS_BASE_URL=/ws
    networks:
      - readyboard-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3001/ || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────
  #  Ingress
  # ─────────────────────────────────────────────
  nginx-proxy:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend-api:
        condition: service_healthy
      backend-ws:
        condition: service_healthy
      frontend-admin:
        condition: service_started
      frontend-display:
        condition: service_started
    networks:
      - readyboard-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
