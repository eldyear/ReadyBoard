server {
    listen 3001;
    server_name _;
    
    root /usr/share/nginx/html;

    location /tv {
        alias /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
