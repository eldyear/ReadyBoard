worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # Docker internal DNS resolver to prevent stale IP caching
    resolver 127.0.0.11 valid=10s;

    # ── Main server block ──────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check passthrough (for Docker healthcheck)
        location = /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ── REST API ─────────────────────────────────────────
        location /api/ {
            set $backend_api http://backend-api:8080;
            proxy_pass $backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
            client_max_body_size 10m;
        }

        # ── WebSocket ─────────────────────────────────────────
        location /ws {
            set $backend_ws http://backend-ws:8081;
            proxy_pass $backend_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;   # Keep WS alive 1 hour
            proxy_send_timeout 3600s;
        }

        # ── Admin Dashboard & Root ─────────────────────────────
        location / {
            set $frontend_admin http://frontend-admin:3000;
            proxy_pass $frontend_admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── TV Display ────────────────────────────────────────
        location /tv/ {
            set $frontend_display http://frontend-display:3001;
            proxy_pass $frontend_display;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

    }

    # ── HTTPS block (uncomment when certs are in nginx/certs/) ─
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     # ... same location blocks as above ...
    # }
}
